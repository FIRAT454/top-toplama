<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Top Toplama Oyunu - Dokunmatik Sürüm</title>
</head>
<body style="background-color: #1a1a2e; margin: 0; padding: 20px; font-family: sans-serif; overflow: hidden; touch-action: none;">

    <div id="dilSeçimi" style="position: absolute; top: 20px; left: 20px; z-index: 30;">
        <button id="dilTrButonu" style="padding: 8px 15px; background-color: #ff007f; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; margin-right: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); -webkit-tap-highlight-color: transparent;">TR</button>
        <button id="dilEnButonu" style="padding: 8px 15px; background-color: #3a3b5c; color: white; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; box-shadow: 0 2px 5px rgba(0,0,0,0.3); -webkit-tap-highlight-color: transparent;">EN</button>
    </div>

    <div id="anaMenu" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; background: rgba(22, 36, 71, 0.95); padding: 40px; border-radius: 15px; border: 2px solid #ff007f; box-shadow: 0px 0px 30px rgba(0,0,0,0.7); width: 80%; max-width: 400px; z-index: 20;">
        <h1 id="menuBaslik" style="color: white; margin-bottom: 10px; font-size: 32px; letter-spacing: 2px;">TOP TOPLAMA</h1>
        
        <div style="color: #00b4d8; font-size: 18px; font-weight: bold; margin-bottom: 25px;">
            <span id="rekorMetni">EN YÜKSEK REKORUN:</span> <span id="enYuksekRekorYazisi">0</span>
        </div>

        <button id="baslaButonu" style="width: 80%; padding: 15px; margin-bottom: 15px; background-color: #00b4d8; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(0,180,216,0.3); -webkit-tap-highlight-color: transparent;">OYUNA BAŞLA</button>
        <button id="nasilOynanirButonu" style="width: 80%; padding: 15px; background-color: #ff007f; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; box-shadow: 0 4px 10px rgba(255,0,127,0.3); -webkit-tap-highlight-color: transparent;">NASIL OYNANIR?</button>
    </div>

    <div id="skorPaneli" style="display: none; position: absolute; top: 20px; right: 20px; color: white; font-size: 18px; font-weight: bold; background: rgba(0,0,0,0.4); padding: 10px 15px; border-radius: 8px; border: 1px solid #ff007f; z-index: 10; pointer-events: none;">
        <span id="skorMetni">Toplanan Top:</span> <span id="toplamTopYazisi" style="color: #00b4d8;">0</span> <br>
        <span id="canMetni">Can:</span> <span id="canYazisi" style="color: #ff007f;">3</span>
    </div>

    <canvas id="oyunTuvali" width="800" height="600" style="background-color: #162447; display: block; margin: auto; box-shadow: 0px 0px 20px rgba(0,0,0,0.5); border-radius: 8px; transition: background-color 0.5s ease; max-width: 100%; height: auto;"></canvas>

    <script>
        window.onload = function() {
            const canvas = document.getElementById("oyunTuvali");
            const ctx = canvas.getContext("2d");

            const anaMenu = document.getElementById("anaMenu");
            const baslaButonu = document.getElementById("baslaButonu");
            const nasilOynanirButonu = document.getElementById("nasilOynanirButonu");
            const skorPaneli = document.getElementById("skorPaneli");
            const toplamTopElementi = document.getElementById("toplamTopYazisi");
            const canElementi = document.getElementById("canYazisi");
            const enYuksekRekorElementi = document.getElementById("enYuksekRekorYazisi");

            const dilTrButonu = document.getElementById("dilTrButonu");
            const dilEnButonu = document.getElementById("dilEnButonu");
            const menuBaslik = document.getElementById("menuBaslik");
            const rekorMetni = document.getElementById("rekorMetni");
            const skorMetni = document.getElementById("skorMetni");
            const canMetni = document.getElementById("canMetni");

            let aktifDil = "TR";
            let oyunDurumu = "MENU";
            let toplananTopSayisi = 0;
            let can = 3;

            const diller = {
                TR: {
                    baslik: "TOP TOPLAMA",
                    rekor: "EN YÜKSEK REKORUN:",
                    basla: "OYUNA BAŞLA",
                    nasil: "NASIL OYNANIR?",
                    skor: "Toplanan Top:",
                    can: "Can:",
                    alertMetni: "Oyun Tüzüğü:\n\n- PC: A-D veya SAĞ-SOL yön tuşlarını kullan kanka.\n- MOBİL: Ekranın soluna veya sağına basılı tutarak sepeti uçur!\n- Kırmızı topları yakala, siyah bombalardan kaç!\n- Nadir düşen YEŞİL ELMALAR +1 can verir!",
                    bitti: "OYUN BİTTİ!",
                    toplamSkor: "Toplam Toplanan Top: ",
                    tekrar: "Yeniden oynamak için ekrana dokun veya F5'e bas kanka!"
                },
                EN: {
                    baslik: "BALL CATCHER",
                    rekor: "HIGH SCORE:",
                    basla: "START GAME",
                    nasil: "HOW TO PLAY?",
                    skor: "Balls Caught:",
                    can: "Lives:",
                    alertMetni: "Game Rules:\n\n- PC: Use A-D or ARROW keys kanka.\n- MOBILE: Touch and hold left/right side of the screen to move!\n- Catch red balls, avoid black bombs!\n- Rare GREEN APPLES give +1 life!",
                    bitti: "GAME OVER!",
                    toplamSkor: "Total Balls Caught: ",
                    tekrar: "Touch screen or press F5 to try again buddy!"
                }
            };

            const renkler = ["#162447", "#2c1647", "#164731", "#473a16", "#471616"];

            function diliGuncelle(dil) {
                aktifDil = dil;
                menuBaslik.innerText = diller[dil].baslik;
                rekorMetni.innerText = diller[dil].rekor;
                baslaButonu.innerText = diller[dil].basla;
                nasilOynanirButonu.innerText = diller[dil].nasil;
                skorMetni.innerText = diller[dil].skor;
                canMetni.innerText = diller[dil].can;

                if (dil === "TR") {
                    dilTrButonu.style.backgroundColor = "#ff007f";
                    dilEnButonu.style.backgroundColor = "#3a3b5c";
                } else {
                    dilTrButonu.style.backgroundColor = "#3a3b5c";
                    dilEnButonu.style.backgroundColor = "#ff007f";
                }
            }

            dilTrButonu.onclick = () => diliGuncelle("TR");
            dilEnButonu.onclick = () => diliGuncelle("EN");

            let enYuksekRekor = localStorage.getItem("topToplamEnYuksekRekor") || 0;
            enYuksekRekorElementi.innerText = enYuksekRekor;

            const sepet = {
                x: canvas.width / 2 - 60,
                y: canvas.height - 40,
                genislik: 120,
                yukseklik: 20,
                hiz: 12
            };

            const topNesnesi = { x: canvas.width / 2, y: 50, yaricap: 15, hizY: 1.0 };
            const bomba = { x: Math.random() * (canvas.width - 30) + 15, y: -100, yaricap: 15, hizY: 1.3 };
            const yesilElma = { x: Math.random() * (canvas.width - 30) + 15, y: -500, yaricap: 12, hizY: 1.5, aktifMi: false };

            let sagTus = false;
            let solTus = false;

            // KLAVYE KONTROLLERİ
            document.addEventListener("keydown", (e) => {
                if (e.key === "ArrowRight" || e.key === "Right" || e.key === "d" || e.key === "D") sagTus = true;
                if (e.key === "ArrowLeft" || e.key === "Left" || e.key === "a" || e.key === "A") solTus = true;
            });

            document.addEventListener("keyup", (e) => {
                if (e.key === "ArrowRight" || e.key === "Right" || e.key === "d" || e.key === "D") sagTus = false;
                if (e.key === "ArrowLeft" || e.key === "Left" || e.key === "a" || e.key === "A") solTus = false;
            });

            // DOKUNMATİK (MOBİL) KONTROLLERİ
            function dokunmaIslemi(e) {
                if (oyunDurumu !== "OYUNDA") {
                    if (oyunDurumu === "BITTI") {
                        location.reload();
                    }
                    return;
                }
                e.preventDefault();
                
                let rect = canvas.getBoundingClientRect();
                let dokunmaX = e.touches[0].clientX - rect.left;
                let canvasGelislikKatsayisi = canvas.width / rect.width;
                let gercekX = dokunmaX * canvasGelislikKatsayisi;

                if (gercekX < canvas.width / 2) {
                    solTus = true;
                    sagTus = false;
                } else {
                    sagTus = true;
                    solTus = false;
                }
            }

            canvas.addEventListener("touchstart", dokunmaIslemi, {passive: false});
            canvas.addEventListener("touchmove", dokunmaIslemi, {passive: false});
            canvas.addEventListener("touchend", (e) => {
                solTus = false;
                sagTus = false;
            }, {passive: false});

            baslaButonu.onclick = function() {
                anaMenu.style.display = "none";
                skorPaneli.style.display = "block";
                toplananTopSayisi = 0;
                toplamTopElementi.innerText = toplananTopSayisi;
                can = 3;
                canElementi.innerText = can;
                topNesnesi.y = 50;
                topNesnesi.hizY = 1.0;
                bomba.y = -100;
                bomba.hizY = 1.3;
                yesilElma.y = -500;
                yesilElma.aktifMi = false;
                canvas.style.backgroundColor = renkler[0];
                oyunDurumu = "OYUNDA";
            };

            nasilOynanirButonu.onclick = function() {
                alert(diller[aktifDil].alertMetni);
            };

            function oyunDongusu() {
                if (oyunDurumu === "OYUNDA") {
                    ctx.clearRect(0, 0, canvas.width, canvas.height);

                    let renkIndeksi = Math.min(Math.floor(toplananTopSayisi / 10), renkler.length - 1);
                    canvas.style.backgroundColor = renkler[renkIndeksi];

                    if (sagTus && sepet.x < canvas.width - sepet.genislik) sepet.x += sepet.hiz;
                    if (solTus && sepet.x > 0) sepet.x -= sepet.hiz;

                    topNesnesi.y += topNesnesi.hizY;
                    bomba.y += bomba.hizY;

                    if (!yesilElma.aktifMi && Math.random() < 0.0006) {
                        yesilElma.aktifMi = true;
                        yesilElma.x = Math.random() * (canvas.width - 30) + 15;
                        yesilElma.y = -50;
                    }

                    if (yesilElma.aktifMi) yesilElma.y += yesilElma.hizY;

                    if (topNesnesi.y + topNesnesi.yaricap >= sepet.y && 
                        topNesnesi.x >= sepet.x && 
                        topNesnesi.x <= sepet.x + sepet.genislik) {
                        toplananTopSayisi++;
                        toplamTopElementi.innerText = toplananTopSayisi;
                        if (topNesnesi.hizY < 4.5) topNesnesi.hizY += 0.15; 
                        topNesnesi.y = 50;
                        topNesnesi.x = Math.random() * (canvas.width - 30) + 15;
                    }

                    if (topNesnesi.y > canvas.height) {
                        topNesnesi.y = 50;
                        topNesnesi.x = Math.random() * (canvas.width - 30) + 15;
                    }

                    if (bomba.y + bomba.yaricap >= sepet.y && 
                        bomba.x >= sepet.x && 
                        bomba.x <= sepet.x + sepet.genislik) {
                        can--;
                        canElementi.innerText = can;
                        bomba.y = -100;
                        bomba.x = Math.random() * (canvas.width - 30) + 15;

                        if (can <= 0) {
                            oyunDurumu = "BITTI";
                            if (toplananTopSayisi > enYuksekRekor) {
                                enYuksekRekor = toplananTopSayisi;
                                localStorage.setItem("topToplamEnYuksekRekor", enYuksekRekor);
                                enYuksekRekorElementi.innerText = enYuksekRekor;
                            }

                            ctx.fillStyle = "white";
                            ctx.font = "bold 40px sans-serif";
                            ctx.textAlign = "center";
                            ctx.fillText(diller[aktifDil].bitti, canvas.width / 2, canvas.height / 2 - 20);
                            ctx.font = "24px sans-serif";
                            ctx.fillStyle = "#00b4d8";
                            ctx.fillText(diller[aktifDil].toplamSkor + toplananTopSayisi, canvas.width / 2, canvas.height / 2 + 30);
                            ctx.font = "18px sans-serif";
                            ctx.fillStyle = "white";
                            ctx.fillText(diller[aktifDil].tekrar, canvas.width / 2, canvas.height / 2 + 80);
                        }
                    }

                    if (bomba.y > canvas.height) {
                        if (bomba.hizY < 5.0) bomba.hizY += 0.1;
                        bomba.y = -100;
                        bomba.x = Math.random() * (canvas.width - 30) + 15;
                    }

                    if (yesilElma.aktifMi && 
                        yesilElma.y + yesilElma.yaricap >= sepet.y && 
                        yesilElma.x >= sepet.x && 
                        yesilElma.x <= sepet.x + sepet.genislik) {
                        if (can < 3) {
                            can++;
                            canElementi.innerText = can;
                        }
                        yesilElma.aktifMi = false;
                        yesilElma.y = -500;
                    }

                    if (yesilElma.y > canvas.height) {
                        yesilElma.aktifMi = false;
                        yesilElma.y = -500;
                    }

                    ctx.fillStyle = "#00b4d8";
                    ctx.fillRect(sepet.x, sepet.y, sepet.genislik, sepet.yukseklik);

                    ctx.beginPath();
                    ctx.arc(topNesnesi.x, topNesnesi.y, topNesnesi.yaricap, 0, Math.PI * 2);
                    ctx.fillStyle = "#ff007f";
                    ctx.fill();
                    ctx.closePath();

                    ctx.beginPath();
                    ctx.arc(bomba.x, bomba.y, bomba.yaricap, 0, Math.PI * 2);
                    ctx.fillStyle = "#000000";
                    ctx.fill();
                    ctx.closePath();

                    if (yesilElma.aktifMi) {
                        ctx.beginPath();
                        ctx.arc(yesilElma.x, yesilElma.y, yesilElma.yaricap, 0, Math.PI * 2);
                        ctx.fillStyle = "#2ec4b6";
                        ctx.fill();
                        ctx.closePath();
                    }
                }
                requestAnimationFrame(oyunDongusu);
            }
            oyunDongusu();
        };
    </script>
</body>
</html>
